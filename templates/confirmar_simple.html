{% extends "base.html" %}

{% block title %}Confirmar Registro{% endblock %}

{% block content %}
        <section class="card hero-card">
            <span class="eyebrow">Confirmacion</span>
            <h1>Registrar llegada/recolección</h1>
            <p class="helper-text">Local detectado</p>
            <h2>{{ local.nombre }}</h2>

            <label>Selecciona tu nombre</label>
            <select id="empleadoId">
                <option value="">-- Selecciona tu nombre --</option>
                {% for e in empleados %}
                <option value="{{ e.id }}">{{ e.nombre }}</option>
                {% endfor %}
            </select>

            <label>Observaciones</label>
            <input type="text" id="observaciones" placeholder="Ej. Turno matutino, área de ventas, etc.">

            <button class="btn" id="btnRegistrar" data-token="{{ local.qr_token }}">
                Registrar
            </button>

            <div id="resultado" class="alert hidden"></div>
        </section>
{% endblock %}

{% block extra_js %}
    <script src="/static/confirmar_simple.js"></script>
{% endblock %}
